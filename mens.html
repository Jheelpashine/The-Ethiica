<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mens section</title>
    <style>
         body{
            background-image: url("https://tse2.mm.bing.net/th?id=OIP.aNgRXnSKQMzViAcZ2pea9QHaHa&pid=Api&P=0&h=180");
        }
        h1{
            background-image: url("https://tse1.mm.bing.net/th?id=OIP.9Iltr2sasS8dOQlOFC0v0wHaDf&pid=Api&P=0&h=180");
            color:lightblue;
            font-family: monospace;
            text-align: center;
            font-size: 12em;
           font-weight: bold;
           z-index:-1;
           text-shadow:  2px 2px 0px black, 
                -2px -2px 0px black,  
                2px -2px 0px black,  
                -2px 2px 0px black;;
        }
        .container{
            display: grid;
            gap:60px;
            text-align: center;
            grid-template-columns: repeat(3,1fr);
        }
        img{
            height: 300px;
            width:250px;
            border: 2px;
            margin: 2px;
        }
        .box{
            background-color:darksalmon;
            padding: 8px;
            grid-template-rows:auto;
            text-align: center;
            font-size: 2em;
            border-radius: 12%;
        }
        .box:hover{
            transform: scale(1.1); 
            filter: brightness(1.2)
        }
        figcaption{
            background-color: black;
            color: bisque;
            font-family: fantasy;
            width: 300px;
            margin-left: 80px;
            margin-top: 2%;
        }
        .search-box {
      display: flex;
      align-items: center;
      border: 4px solid #ff2020;
      border-radius: 30px;
      overflow: hidden;
      background-color: #fff;
      box-shadow: 0 5px 8px rgba(0, 0, 0, 0.1);
      margin-top: 5%;
      margin-bottom: 3%;
      margin-left: 30%;
      margin-right: 50%;
      font-size: 15px;
    }
    .buy{
        background-color: rgb(255, 123, 0);
        color: darkblue;
        font-size: 0.5em;
        margin-top: 2%;
    }
    .buy:hover{
        background-color: rgb(230, 83, 15);
    }

    @media (max-width: 480px) {
            h1 {
                font-size: 3em;
            }
            .container {
                grid-template-columns: 1fr;
            }
            img {
                height: 150px;
                width: 120px;
            }
            figcaption {
                width: 180px;
            }
            .search-box {
                margin: 5% 5%;
                font-size: 10px;
            }
        }
    </style>
</head>
<body style="background-color: black;">
    <center>
    <h1>Men's Section</h1>
    <div class="search-box">
        <input type="text" placeholder="Search products...">
        <button type="submit">Search</button>
      </div>
    <div class="container">
        <div class="box"><img src="https://i.pinimg.com/originals/be/e9/b6/bee9b63bf954fb73022eb7837d470605.jpg">
        <figcaption>Rs.750 </figcaption>
        <button class="buy">buy now</button></div>
        <div class="box"><img src="https://i.pinimg.com/originals/56/b0/c6/56b0c68cd3c48e0cc2bc12386b42ab2b.jpg">
            <figcaption>Rs.900 </figcaption>
            <button  onclick="window.location.href='mbuy.html'"class ="buy">buy now</button></div>
        <div class="box"><img src="https://i.pinimg.com/originals/c4/e3/fd/c4e3fdf9ef72ac3f50c6b12ad4442bf1.jpg">
            <figcaption>Rs.840 </figcaption>
            <button class="buy">buy now</button></div>
        <div class="box"><img src="https://cdn.shopify.com/s/files/1/0070/4285/9119/products/JOKP_WC_4059_Mustard-B_1_1024x1024@2x.jpg?v=1591957501">
            <figcaption>Rs.670 </figcaption>
            <button class="buy">buy now</button></div>
        <div class="box"><img src="https://i.pinimg.com/originals/b6/95/6d/b6956d0ace847af93045b11e55f8b27c.jpg">
            <figcaption>Rs.700 </figcaption>
            <button class="buy">buy now</button></div>
        <div class="box"><img src="https://i.pinimg.com/originals/2c/41/18/2c4118e096b3338e141e7447832abec3.jpg">
            <figcaption>Rs.800 </figcaption>
            <button class="buy">buy now</button></div>
    </div>

</center>
</body>
</html>
