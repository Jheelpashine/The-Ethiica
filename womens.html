<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>womens section</title>
    <style>
         body{
            background-image: url("https://tse2.mm.bing.net/th?id=OIP.aNgRXnSKQMzViAcZ2pea9QHaHa&pid=Api&P=0&h=180");
        }
        h1{
            background-image: url("https://tse2.mm.bing.net/th?id=OIP.hjxKpUf3U1ZIaJ1Wk_VBywHaDs&pid=Api&P=0&h=180");
            color:aliceblue;
            font-family: monospace;
            text-align: center;
            font-size: 12em;
           font-weight: bold;
           z-index:-1;
           text-shadow:  2px 2px 0px black, 
                -2px -2px 0px black,  
                2px -2px 0px black,  
                -2px 2px 0px black;;
        }
        .container{
            display: grid;
            gap:60px;
            text-align: center;
            grid-template-columns: repeat(3,1fr);
        }
        img{
            height: 300px;
            width:250px;
    
        }
        .box{
            background-color: burlywood;
            padding: 8px;
            grid-template-rows:auto;
            text-align: center;
            font-size: 2em;
            border-radius: 12%;
        }
        .box:hover{
            transform: scale(1.1); 
            filter: brightness(1.2)
        }
        .search-box {
      display: flex;
      align-items: center;
      border: 4px solid #ff2020;
      border-radius: 30px;
      overflow: hidden;
      background-color: #fff;
      box-shadow: 0 5px 8px rgba(0, 0, 0, 0.1);
      margin-top: 5%;
      margin-bottom: 3%;
      margin-left: 30%;
      margin-right: 50%;
      font-size: 15px;
    }
    figcaption{
            background-color: black;
            color: bisque;
            font-family: fantasy;
            width: 300px;
            margin-left: 80px;
            margin-top: 2%;
        }
        .buy{
        background-color: rgb(197, 199, 61);
        color: darkblue;
        font-size: 0.5em;
        margin-top: 2%;
    }
    .buy:hover{
        background-color: rgb(156, 154, 5);
    }
    @media (max-width: 480px) {
            h1 {
                font-size: 3em;
            }
            .container {
                grid-template-columns: 1fr;
            }
            img {
                height: 150px;
                width: 120px;
            }
            figcaption {
                width: 180px;
            }
            .search-box {
                margin: 5% 5%;
                font-size: 10px;
            }
        }
    </style>
</head>
<body style="background-color: black;">
    <center>
    <h1>women's section</h1>
    <div class="search-box">
        <input type="text" placeholder="Search products...">
        <button type="submit">Search</button>
      </div>
    <div class="container">
        <div class="box"><img src="https://www.beatitude.in/cdn/shop/articles/DSC_2173_720x_dec1d27e-c2a7-4ce7-8b21-654c0ca12e43_1200x1200.webp?v=1675162397">
        <figcaption>Rs.900</figcaption>
        <button class="buy">buy now</button></div>
        <div class="box"><img src="https://www.kreeva.com/blog/wp-content/uploads/2021/12/Anarkali-Dress-Ideas-For-Women.jpg">
            <figcaption>Rs.1010</figcaption>
            <button class="buy">buy now</button></div>
        <div class="box"><img src="https://i.pinimg.com/originals/ef/ad/39/efad399183b32d3bfcbed6c237d6acfa.jpg">

        <div class="box"><img src="https://i.pinimg.com/originals/e6/45/8d/e6458d4ab2b76fa9cb2c7ee46b89581f.jpg">
            <figcaption>Rs.870</figcaption>
            <button class="buy">buy now</button></div>
        <div class="box"><img src="https://1.bp.blogspot.com/-P4VF2Tkfd1A/WWMLdBJEYbI/AAAAAAAAABg/WS19kq0sMLksY60Yg3NKHn9k_2QJcZx7ACEwYBhgL/s1600/537d6a.jpg">
            <figcaption>Rs.940</figcaption>
            <button  onclick="window.location.href='wbuy.html';"class="buy">buy now</button></div>
        <div class="box"><img src="https://assets.myntassets.com/h_1440,q_90,w_1080/v1/assets/images/productimage/2020/6/11/2e082270-9257-4b75-a7fd-5ca1b90742091591832082620-1.jpg">
            <figcaption>Rs.1050</figcaption>
            <button class="buy">buy now</button></div>
    </div>
    
</center>
</body>
</html>
