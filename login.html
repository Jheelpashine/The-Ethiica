<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
   
    
    <div class="login-container">
         <h1>The Ethiica</h1>
        <div class="header">
        Welcome to <strong><b>The Ethiica!</b></strong> <br> 
        Please Login To Continue To The Website<br>
      </div><br>
        <h2>Login</h2>
        <form id="loginForm" >
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail address</address></label>
                <input type="email" id="email" name="email" required aria-required="true">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required aria-required="true" aria-label="Enter your password">
            </div>
            <button type="submit" class="btn">Login</button>
           
        </form>
    </div>
    
    <script>
        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault(); 

            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const user = {
                username: username,
                email: email,
                password: password 
            };
            
            let users = JSON.parse(localStorage.getItem("users")) || [];
  
            users.push(user);
           
            localStorage.setItem("users", JSON.stringify(users));

            alert("Login successful! Data stored locally.");
            
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
